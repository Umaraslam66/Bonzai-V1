methodology:
  alpha: 0.05
  bref_exclusion: outbound-bref line features excluded by construction identity (_has_outbound_bref on the ORIGINAL token block), counted per city, applied ONCE so every variant sees the SAME feature pool
  cities:
  - eisenhuttenstadt
  - glasgow
  - krakow
  - munich
  effect_size_floor: 0.15
  min_n: 50
  rate_criterion: variants are judged by rate = n_significant_effect / n_pairs (null when n_pairs == 0), NOT by raw count — the count criterion is confounded by changing pair denominators (PI-locked at this gate)
  release: 2026-04-15.0
  v1c_note: 'the PI-requested ''V1c = per-cell-density-only swap'' is IDENTICAL to V0 by construction and is therefore not run: the gate''s density slot is already per-cell (each feature''s own cell_density_bucket via _cell_density_by_cell / macro_core cell_density_bucket), so swapping it tile->cell changes nothing. The correct decomposition of V1 is the 2x2 over {tile vs cell zoning} x {dims kept vs dropped}: V0 (tile zoning, dims kept), V1b (cell zoning, dims kept), V1d (tile zoning, dims dropped), V1 (cell zoning, dims dropped).'
  variants:
    V0:
      description: 'baseline: the exact gate-(i) stratum'
      stratum:
      - dominant_zoning_class
      - modal_road_skeleton_class
      - cell_density_bucket
      - coastal_inland_river
    V1:
      description: 'un-collapse: per-cell zoning REPLACES the tile-dominant zoning and the skeleton+coastal tile dims are DROPPED; the density slot is unchanged (already per-cell)'
      stratum:
      - per_cell_zoning_class
      - cell_density_bucket
    V1b:
      description: 'attribution (zoning swap, dims KEPT): V0 with only the zoning slot un-collapsed to the cell''s own zoning_class — isolates V1''s tile->cell zoning change'
      stratum:
      - per_cell_zoning_class
      - modal_road_skeleton_class
      - cell_density_bucket
      - coastal_inland_river
    V1d:
      description: 'attribution (dims DROPPED, zoning kept): V0 with the skeleton+coastal dims pooled away, tile-dominant zoning retained — isolates V1''s dim-drop change'
      stratum:
      - dominant_zoning_class
      - cell_density_bucket
    V2_16:
      density_bucket_scheme:
        n_buckets: 16
        overflow: ratios > 1 (pathological) clip into the last bucket
        range:
        - 0.0
        - 1.0
        scheme: equal_width
        top_edge: inclusive
      description: 'un-quantize: V0 with the 4-bucket density slot replaced by a 16-bucket index over raw building_footprint_ratio'
    V2_8:
      density_bucket_scheme:
        n_buckets: 8
        overflow: ratios > 1 (pathological) clip into the last bucket
        range:
        - 0.0
        - 1.0
        scheme: equal_width
        top_edge: inclusive
      description: 'un-quantize: V0 with the 4-bucket density slot replaced by an 8-bucket index over raw building_footprint_ratio'
    V3:
      description: 'candidate dim: V0 PLUS an appended per-cell sea_water_fraction bucket (sub-C cells.parquet)'
      sea_bucket_scheme:
        bucket_0: sea_water_fraction <= EPS_RATIO (1e-09)
        bucket_1: (EPS_RATIO, 0.5]
        bucket_2: '> 0.5'
    V4:
      building_size_bucket_scheme:
        bucket_0: no buildings in the cell (median is null)
        bucket_1: median <= 10 m² (floor-bucketed)
        bucket_10: median > 2560 m² (ceiling-bucketed)
        buckets_2_to_9: '1 + number of area doublings above 10 m²: equal-log-width (factor-2) edges 10, 20, 40, 80, 160, 320, 640, 1280, 2560 m² (top edge of each interval inclusive)'
        n_buckets: 11
        n_buckets_note: '11 distinct values: bucket 0 (no buildings) + 10 size buckets (1..10)'
        statistic: median building footprint area (m²) per cell
      description: 'candidate dim: V0 PLUS an appended per-cell building-size bucket — MEDIAN building footprint area (m²) over the cell''s building polygons (sub-C features.parquet); tests the spec §4.1 evidence anchor (building geometry as the missing character) directly'
