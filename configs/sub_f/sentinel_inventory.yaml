  used_count: 571
  used_range: 300..870
  consumed_from_reserved_v2_headroom:
    rationale: |
      T8 plan-write (2026-05-28) surfaced spec §2.2 / sentinel_inventory.yaml
      inconsistency — `<feature>` / `<feature_end>` were named in §2.2 as on-disk
      structural sentinels but had NO allocated ID in any sub-block. Resolved
      append-safely by consuming the FIRST 2 IDs of reserved_v2_headroom;
      headroom shrinks from the front (was 509–1499, now 511–1499). Block
      boundaries are NOT re-anchored — IDs are consumed from the front of
      reserved space per append-only discipline. Family classification of
      these tokens is `structural` (grammar primitives), distinct from the
      `encoding_primitive` family of the anchor/direction/magnitude sub-blocks
      whose ID neighborhood they share. See spec §13.1 Halt-2-cascade entry.
    slots:
    - id: 509
      token: <feature>
      on_disk: true
      family_tag: structural
    - id: 510
      token: <feature_end>
      on_disk: true
      family_tag: structural
  direction_relocation_2026_05_29:
    rationale: |
      Halt-2 revisit 2026-05-29 widened direction 48->360 (1deg bins) for
      round-trip fidelity on long/wiggly real features (see
      encoding_primitives.yaml proposed_lock.revisit_2026_05_29 + §13.1). 360
      contiguous slots do NOT fit at the old direction base 396 — magnitude
      (444-508) and structural sentinels (509-510) sit immediately after — so
      extending in place would renumber locked IDs (append-only violation).
      RESOLVED append-safely: the direction sub-block RELOCATES to 511-870
      (360 contiguous slots consumed from the FRONT of reserved_v2_headroom, the
      exact precedent the structural sentinels set). Magnitude, structural,
      anchor, and BP7 are UNCHANGED — no locked non-direction ID moves. The old
      396-443 block is RETIRED to direction_v1_deprecated (allocated-but-unused,
      available for v2); it is NOT reused with new meaning (that would reassign
      locked IDs, a worse violation than retiring). reserved_v2_headroom shrinks
      989->629 (871-1499). Contiguity is a convention (arithmetic base offset),
      preserved by relocation (new base 511); no mapping table needed.
    old_direction_block: 396..443 (retired)
    new_direction_block: 511..870
    reserved_headroom_before: 511..1499 (989)
    reserved_headroom_after: 871..1499 (629)
