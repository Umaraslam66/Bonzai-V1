release: "2026-04-15.0"
train_set: "eu-train-union"
region: "krakow"             # [C] TAG only — eval scores all 4 held-out cities (per-city KS)
backbone: "mamba-hybrid"
d_model: 512                 # locked 53M table: d512/24L/e7 = 53,733,348 (21 mamba + 3 tf @ 8/16/24)
n_layers: 24
n_heads: 8
max_len: 13312               # scored-run gate: == DEFAULT_MAX_CELL_TOKENS
batch_size: 1                # [E] proven 6.8 GB; grad_accum 4 -> effective batch 16
grad_accum: 4
lr: 0.0003
max_steps: 112563            # [D] MEASURED (r=20, avg body 596.7, eff-batch 16)
compile: false               # --no-compile (T7 verdict)
shard_cache: "data/processed/training_cache"
eval_cells: 0                # TRAIN-ONLY scored matrix (PI 2026-06-22): NO built-in per-cell slice
                             # eval. Realism verdict is the SEPARATE gated step — generate the SEALED
                             # Lane-S manifest's 5,705 cells -> verify_gen_coverage -> decide().
                             # 0 is 0-cell-safe (slice_eval / buildings_emerged guarded; report writes).
eval_max_new: 13312          # scored-run gate: >= DEFAULT_MAX_CELL_TOKENS
conditioning_scheme: "value-char-v1"
conditioning_ablation: "full"
precision: "bf16-mixed"
seed: 7                      # [A] loader default; the matrix overrides via SEED -> --seed (7/13/23)
